<svg xmlns="http://www.w3.org/2000/svg" width="600" height="772" viewBox="0 0 600 772">
<defs>
  <style>
    .bg { fill: #0d1117; rx: 10; }
    .title { font-family: 'Segoe UI', sans-serif; font-size: 18px; font-weight: 600; fill: #58a6ff; }
    .subtitle { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #8b949e; }
    .group-title { font-family: 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; fill: #c9d1d9; }
    .label { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #e6edf3; }
    .value { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #8b949e; }
    .bar-bg { fill: #161b22; rx: 4; }
    .row { opacity: 0; animation: fadeInRight 0.5s ease forwards; }
    @keyframes fadeInRight { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</defs>
<rect class="bg" width="100%" height="100%"/>
<text class="title" x="30" y="40">⚡ Winload Benchmarks</text>
<text class="subtitle" x="30" y="65">Runner: DESKTOP-28AGCCU | OS: Linux 6.6.87.2-microsoft-standard-WSL2 | CPU: 12th Gen Intel(R) Core(TM) i5-12400F | RAM: 15.5 GB</text>
<line x1="30" y1="80" x2="570" y2="80" stroke="#30363d" stroke-width="1"/>
<text class="group-title" x="30" y="115">Startup Time (lower is better)</text>
<g class="row" style="animation-delay: 0.0s">
<text class="label" x="30" y="150">nload (C++)</text>
<rect class="bar-bg" x="140" y="136" width="300" height="20"/>
<rect x="140" y="136" width="2" height="20" rx="3" fill="#ffd43b">
  <animate attributeName="width" from="0" to="2" dur="0.8s" begin="0.0s" fill="freeze"/>
</rect>
<text class="value" x="450" y="150">2.7 ms</text>
</g>
<g class="row" style="animation-delay: 0.1s">
