<text class="label" x="30" y="210">nload (C++)</text>
<rect class="bar-bg" x="140" y="196" width="300" height="20"/>
<rect x="140" y="196" width="2" height="20" rx="3" fill="#ffd43b">
  <animate attributeName="width" from="0" to="2" dur="0.8s" begin="0.0s" fill="freeze"/>
</rect>
<text class="value" x="450" y="210">2.7 ms</text>
</g>
