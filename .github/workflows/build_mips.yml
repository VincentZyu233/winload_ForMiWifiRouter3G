name: Build MIPS (Cross-Compile for OpenWrt Router)

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_release: ${{ steps.flags.outputs.should_release }}
      version: ${{ steps.flags.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse commit message
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MSG="$COMMIT_MSG"
          echo "commit_message=$MSG" >> "$GITHUB_OUTPUT"

          VERSION="v$(grep '^version' rust/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

          # "build release"  → 阶段一(校验) + 阶段二(构建) + 阶段三(发 Release)
          # "build action"  → 阶段一(校验) + 阶段二(构建)
          # 无关键词        → 仅阶段一(校验)
          BUILD=false
          RELEASE=false

          if echo "$MSG" | grep -qi "build release"; then
            BUILD=true
            RELEASE=true
          elif echo "$MSG" | grep -qi "build action"; then
            BUILD=true
          fi

          echo "should_build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "should_release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "📋 Flags: build=$BUILD release=$RELEASE"

  build-mipsel:
    name: Build mipsel (MIPS Little-Endian)
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust + cross
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rust-src
        env:
          CARGO_HOME: /opt/hostedtoolcache/Rust

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build MIPS binary using cross + Docker
        env:
          CARGO_HOME: /opt/hostedtoolcache/Rust
        run: |
          cargo install cross --locked || true
          export PATH="$CARGO_HOME/bin:$PATH"
          cd rust
          cross build --release --target mipsel-unknown-linux-musl -Zbuild-std=std,panic_abort

      - name: Package
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          mkdir -p dist
          cp rust/target/mipsel-unknown-linux-musl/release/winload dist/winload-${VERSION}-mipsel-unknown-linux-musl
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: winload-mipsel
          path: dist/
          retention-days: 5

  release:
    name: Publish GitHub Release
    needs: [check, build-mipsel]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: winload-mipsel
          path: dist/

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          REPO="${{ github.repository }}"
          BUILD_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S CST')
          COMMIT_SHA="${GITHUB_SHA::7}"

          cat > release_notes.md << 'NOTES_EOF'
          ## winload for MiWiFi Router 3G (MIPS)

          Cross-compiled for **mipsel-unknown-linux-musl** (MIPS32 Little-Endian, soft-float, static).

          ### Build Info

          | Item | Value |
          |------|-------|
          | Target | `mipsel-unknown-linux-musl` |
          | Toolchain | Rust nightly + `-Zbuild-std=std,panic_abort` |
          | Linking | Static (musl) |
          | Float | Software (`soft-float`, for MT7621 / OpenWrt) |
          | Tool | `cross` + Docker |

          ### Usage

          ```bash
          scp ./winload-*-mipsel-unknown-linux-musl root@<router-ip>:/usr/bin/winload
          chmod +x /usr/bin/winload
          winload
          ```

          NOTES_EOF

          # Remove heredoc indentation
          sed -i 's/^          //' release_notes.md

          # Append dynamic info
          cat >> release_notes.md << EOF
          ---

          Last successful build: **${BUILD_TIME}** · Commit [\`${COMMIT_SHA}\`](https://github.com/${REPO}/commit/${GITHUB_SHA})

          > *Generated by GitHub Actions CI workflow.*
          EOF

          sed -i 's/^          //' release_notes.md

          # Delete existing release if any, then create fresh
          gh release delete "${VERSION}" --yes --cleanup-tag 2>/dev/null || true
          sleep 2

          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes-file release_notes.md \
            --prerelease \
            dist/*
