name: Build MIPS (Cross-Compile for OpenWrt Router)

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    name: Check commit message
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.flags.outputs.should_build }}
      should_release: ${{ steps.flags.outputs.should_release }}
      version: ${{ steps.flags.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse commit message
        id: flags
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MSG="$COMMIT_MSG"
          echo "commit_message=$MSG" >> "$GITHUB_OUTPUT"

          VERSION="v$(grep '^version' rust/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "📦 Version: $VERSION"

          # "build release"  → 阶段一(校验) + 阶段二(构建) + 阶段三(发 Release)
          # "build action"  → 阶段一(校验) + 阶段二(构建)
          # 无关键词        → 仅阶段一(校验)
          BUILD=false
          RELEASE=false

          if echo "$MSG" | grep -qi "build release"; then
            BUILD=true
            RELEASE=true
          elif echo "$MSG" | grep -qi "build action"; then
            BUILD=true
          fi

          echo "should_build=$BUILD"     >> "$GITHUB_OUTPUT"
          echo "should_release=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "📋 Flags: build=$BUILD release=$RELEASE"

  build-mipsel:
    name: Build mipsel (MIPS Little-Endian)
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MIPS cross-compiler + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mipsel-linux-gnu libc6-dev-mipsel-cross qemu-user

      - name: Install Rust (nightly for --build-std)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Build std from source + QEMU verify
        env:
          CARGO_TARGET_MIPSEL_UNKNOWN_LINUX_GNU_LINKER: mipsel-linux-gnu-gcc
          CARGO_TARGET_MIPSEL_UNKNOWN_LINUX_GNU_RUNNER: qemu-mipsel
        run: |
          # 确认 QEMU mips 可执行文件存在
          which qemu-mipsel || ls /usr/bin/qemu-mipsel*
          cd rust
          cargo +nightly build --release --target mipsel-unknown-linux-gnu --build-std -Z build-std=std,panic_abort
          echo "=== QEMU verify ==="
          qemu-mipsel ./target/mipsel-unknown-linux-gnu/release/winload --help || true

      - name: Package
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          mkdir -p dist
          cp rust/target/mipsel-unknown-linux-gnu/release/winload dist/winload-${VERSION}-mipsel-unknown-linux-gnu
          ls -lh dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: winload-mipsel
          path: dist/
          retention-days: 5

  release:
    name: Publish GitHub Release
    needs: [check, build-mipsel]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: winload-mipsel
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.version }}
          name: ${{ needs.check.outputs.version }}
          draft: false
          prerelease: true
          files: dist/*
          generate_release_notes: true
