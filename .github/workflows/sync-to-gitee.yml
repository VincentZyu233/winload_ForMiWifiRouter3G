name: Sync to Gitee

on:
  push:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      sync_release:
        description: '是否同步最新 Release 到 Gitee？'
        required: false
        type: boolean
        default: false

jobs:
  # ── 同步代码（分支 + Tag + Commit）──────────────────────
  sync-code:
    name: Sync Code to Gitee
    runs-on: ubuntu-latest
    steps:
      - name: Mirror to Gitee
        uses: Yikun/hub-mirror-action@master
        with:
          src: github/VincentZyuApps
          dst: gitee/vincent-zyu
          dst_key: ${{ secrets.GITEE_PRIVATE_KEY }}
          dst_token: ${{ secrets.GITEE_TOKEN }}
          static_list: "winload"
          force_update: true
          debug: true

  # ── 同步 Release（标题 + 说明 + 附件）──────────────────
  sync-release:
    name: Sync Release to Gitee
    runs-on: ubuntu-latest
    needs: sync-code
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.sync_release == 'true')
    env:
      GITEE_OWNER: "vincent-zyu"
      GITEE_REPO: "winload"
    steps:
      - name: Get release info from GitHub
        id: release_info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            # workflow_dispatch: 取最新 release
            TAG=$(curl -sL -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r .tag_name)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # 获取 release 详情
          RELEASE_JSON=$(curl -sL -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")

          # release title
          TITLE=$(echo "$RELEASE_JSON" | jq -r .name)
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

          # release body
          echo "$RELEASE_JSON" | jq -r .body > release_notes.md

          # 列出所有 asset 下载链接
          echo "$RELEASE_JSON" | jq -r '.assets[] | .browser_download_url' > asset_urls.txt

          echo "📦 Release tag: $TAG"
          echo "📄 Title: $TITLE"
          echo "📎 Assets:"
          cat asset_urls.txt

      - name: Download release assets from GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p assets
          ASSET_COUNT=0
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            filename=$(basename "$url")
            echo "📥 Downloading $filename..."
            curl -fSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/octet-stream" \
              -o "assets/$filename" \
              "$url" || echo "⚠️ Failed to download $filename"
            ASSET_COUNT=$((ASSET_COUNT + 1))
          done < asset_urls.txt
          echo "✅ Downloaded $ASSET_COUNT assets"
          ls -lh assets/

      - name: Create/Update Gitee Release
        id: gitee_release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_TAG: ${{ steps.release_info.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release_info.outputs.title }}
        run: |
          set -euo pipefail

          # ── 1. 确保 Gitee 上有这个 Tag ──
          TAG_CHECK=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/tags/$RELEASE_TAG?access_token=$GITEE_TOKEN")

          if [ "$TAG_CHECK" != "200" ]; then
            echo "📌 Creating tag $RELEASE_TAG on Gitee..."
            curl -sS -X POST --header 'Content-Type: application/json;charset=UTF-8' \
              "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/tags" \
              -d "{\"access_token\":\"$GITEE_TOKEN\",\"tag_name\":\"$RELEASE_TAG\",\"refs\":\"main\",\"tag_message\":\"Release $RELEASE_TAG\"}" \
              || echo "⚠️ Tag creation returned non-zero (may already exist via code sync)"
          else
            echo "✅ Tag $RELEASE_TAG already exists on Gitee"
          fi

          # ── 2. 检查 Gitee 上是否已有该 Release ──
          EXISTING_RESPONSE=$(curl -sS \
            "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/tags/$RELEASE_TAG?access_token=$GITEE_TOKEN")
          RELEASE_ID=$(echo "$EXISTING_RESPONSE" | jq -r '.id // empty')

          JSON_NOTES=$(jq -R -s '.' < release_notes.md)

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "🆕 Creating new Gitee release for $RELEASE_TAG..."
            RELEASE_PAYLOAD=$(jq -n \
              --arg token "$GITEE_TOKEN" \
              --arg tag "$RELEASE_TAG" \
              --arg name "$RELEASE_TITLE" \
              --argjson notes "$JSON_NOTES" \
              '{access_token: $token, tag_name: $tag, name: $name, body: $notes, target_commitish: "main"}')

            CREATE_RESPONSE=$(curl -sS -X POST --header 'Content-Type: application/json;charset=UTF-8' \
              "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases" \
              -d "$RELEASE_PAYLOAD")
            RELEASE_ID=$(echo "$CREATE_RESPONSE" | jq -r '.id // empty')
          else
            echo "🔄 Updating existing Gitee release (ID: $RELEASE_ID)..."
            UPDATE_PAYLOAD=$(jq -n \
              --arg token "$GITEE_TOKEN" \
              --arg tag "$RELEASE_TAG" \
              --arg name "$RELEASE_TITLE" \
              --argjson notes "$JSON_NOTES" \
              '{access_token: $token, tag_name: $tag, name: $name, body: $notes}')

            curl -sS -X PATCH --header 'Content-Type: application/json;charset=UTF-8' \
              "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/$RELEASE_ID" \
              -d "$UPDATE_PAYLOAD"
          fi

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "❌ Failed to create/find Gitee release"
            exit 1
          fi

          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "✅ Gitee Release ID: $RELEASE_ID"

      - name: Upload assets to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          RELEASE_ID: ${{ steps.gitee_release.outputs.release_id }}
        run: |
          echo "📤 Uploading assets to Gitee Release #$RELEASE_ID..."
          SUCCESS=0
          FAIL=0
          for asset in assets/*; do
            [ -f "$asset" ] || continue
            filename=$(basename "$asset")
            echo "  📤 $filename ($(du -h "$asset" | cut -f1))..."
            HTTP_CODE=$(curl -s -o /tmp/upload_response.json -w "%{http_code}" \
              -X POST --header "Content-Type: multipart/form-data" \
              -F "access_token=$GITEE_TOKEN" \
              -F "file=@$asset" \
              "https://gitee.com/api/v5/repos/$GITEE_OWNER/$GITEE_REPO/releases/$RELEASE_ID/attach_files")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "     ✅ Uploaded"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "     ⚠️ Failed (HTTP $HTTP_CODE)"
              cat /tmp/upload_response.json 2>/dev/null || true
              FAIL=$((FAIL + 1))
            fi
          done
          echo ""
          echo "📊 Upload summary: $SUCCESS succeeded, $FAIL failed"
          if [ "$FAIL" -gt 0 ]; then
            echo "⚠️ Some assets failed to upload. Check Gitee release page manually."
          fi
          echo "🎉 Gitee release sync complete!"
